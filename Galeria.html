<!DOCTYPE html>

<title>Galería - Empresa</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
}

/* MENÚ */

nav{
    background-color:#2c3e50;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-right:20px;
    font-weight:bold;
}

nav a:hover{
    color:#f1c40f;
}

/* ENCABEZADO */

.header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:70px 20px;
}

.header h1{
    font-size:40px;
}

/* SECCIÓN */

.section{
    padding:60px 20px;
    max-width:1200px;
    margin:auto;
}

.section h2{
    color:#2c3e50;
    text-align:center;
}

/* GALERÍA */

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    margin-top:40px;
}

.galeria img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:8px;
    transition:transform 0.3s;
}

.galeria img:hover{
    transform:scale(1.05);
}

/* FOOTER */

footer{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}

</style>
</head>
